name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-examples:
    name: Validate example envelopes and conformance vectors against JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate example envelopes and conformance test vectors
        run: npm run -s validate

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off on all commits in this PR
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MISSING=0
          while read -r sha; do
            if ! git log -1 --pretty=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error ::Commit $sha is missing DCO sign-off."
              MISSING=$((MISSING + 1))
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$MISSING" -gt 0 ]; then
            echo "$MISSING commit(s) missing DCO sign-off. See CONTRIBUTING.md."
            exit 1
          fi
